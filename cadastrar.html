<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Cadastro de Materiais</title>
    <link rel='stylesheet' href='style.css'>
</head>
<body class="principal">
    <form id="formCadastro">
        <h1>Cadastro de Materiais</h1>
        <div class="colum">
            <label for="nome">Nome</label>
            <input id="input-nome" type="text" placeholder="luvas, agulhas..." required>
            <label for="qntEstoque">Quantidade em Estoque</label>
            <input id="input-quantidade" type="text" placeholder="5..." required>
        </div>
        <div id="btn">
            <button id="btn-cadastrar" type="button">Cadastrar</button>
        </div>
    </form>
    <script src="main.js"></script>
</body>
</html>
