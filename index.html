<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Sistema de Almoxarifado</title>
    <link rel='stylesheet' href='style.css'>
</head>
<body class="principal">
    <h1 id="titulo">Sistema de Almoxarifado</h1>
    <div class="divisao">
        <div class="coluna-esquerda">  <!--cadastro e busca-->
            <form id="formCadastro">
                <h1>Cadastro de Materiais</h1>
                <div class="colum">
                    <label for="nome">Nome</label>
                    <input id="input-nome" type="text" placeholder="luvas, agulhas..." required>
                    <label for="qntEstoque">Quantidade em Estoque</label>
                    <input id="input-quantidade" type="text" placeholder="5..." required>
                </div>
                <div class="btn">
                    <button id="btn-cadastrar" type="button">Cadastrar</button>
                </div>
            </form>

            <div class="busca">
                <h1 for="">Busca por item: </h1>
                <input id="input-busca" type="text">
                <div class="btn">
                    <button id="btnBuscar">Buscar</button>
                </div>
                <p>Quantidade total: <span id="total-itens">0</span></p>
            </div>
        </div>

        <!--tabela-->
        <div class="tabela-container" style="overflow-x: auto;">
            <h1>Produtos Cadastrados</h1>
            <table id="tabelaProdutos">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-materiais">
                    <tr><td colspan="3">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <dialog id="dialog">
        <div class="colum dig">
            <div class="btnClose">
                <button id="btnClose" type="button">❌</button>
            </div>
            <label for="valorRetirada" class="labelRetirada">Informe o valor de retirada:</label>
            <input type="text" id="input-retirada">
            <div id="btn">
                <button class="btn-baixar" type="button">Baixar</button>
            </div>
        </div>
    </dialog>
    <script src="main.js"></script>
</body>
</html>
