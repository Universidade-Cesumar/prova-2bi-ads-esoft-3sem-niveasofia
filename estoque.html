<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Produtos</title>
    <link rel='stylesheet' href='style.css'>
</head>
<body class="principal">
    <div class="tabela-container" style="overflow-x: auto;">
        <h1>Produtos Cadastrados</h1>
        <table id="tabelaProdutos">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Quantidade</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="lista-materiais">
                <tr><td colspan="2">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
    <dialog id="dialog">
        <div class="colum dig">
            <div class="btnClose">
                <button id="btnClose" type="button">❌</button>
            </div>
            <label for="valorRetirada" class="labelRetirada">Informe o valor de retirada:</label>
            <input type="text" id="input-retirada">
            <div id="btn">
                <button class="btn-baixar" type="button">Baixar</button>
            </div>
        </div>
    </dialog>
    <script src="main.js"></script>
</body>
</html>
